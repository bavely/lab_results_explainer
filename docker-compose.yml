services:
  api:
    build:
      context: ./apps/api
    ports:
      - "4000:4000"
    env_file:
      - ./apps/api/.env
    environment:
      - FLASK_ENV=development

  web:
    build:
      context: ./apps/web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:4000
    depends_on:
      - api
