services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: lab-results-api
    restart: unless-stopped
    env_file:
      - apps/api/.env
    ports:
      - "127.0.0.1:4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: lab-results-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - api
